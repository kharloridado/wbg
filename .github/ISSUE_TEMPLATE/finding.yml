name: Design Finding
description: A design-conformance finding (accessibility / brand / token). The implementation matches the design; this tracks the conflict for a design decision.
title: "FND-XXX [type/code] short summary"
labels: ["finding"]
body:
  - type: dropdown
    id: type
    attributes:
      label: Type
      options: [accessibility, brand-color, design-token, consistency]
    validations: { required: true }
  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options: [blocker, high, medium, low]
    validations: { required: true }
  - type: input
    id: location
    attributes:
      label: Location
      description: Screen / component + Figma node id
    validations: { required: true }
  - type: textarea
    id: observed
    attributes:
      label: Observed (as designed)
      description: The exact as-designed value (hex, px, contrast ratio)
    validations: { required: true }
  - type: input
    id: rule
    attributes:
      label: Rule violated
      description: e.g. WCAG 2.2 SC 1.4.3 / not in brand palette / no matching token
    validations: { required: true }
  - type: textarea
    id: recommendation
    attributes:
      label: Recommendation (for design / brand owner)
      description: Advice only — not applied to code until design responds or brand owner signs off
    validations: { required: true }
  - type: textarea
    id: impl
    attributes:
      label: Implementation note
      description: Confirm the build is faithful to the current design
    validations: { required: true }
